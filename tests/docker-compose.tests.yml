# Docker Compose file for running integration tests
# This is a minimal setup for CI/CD pipelines

services:
  # PostgreSQL for tests
  postgres-tests:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "TestPassword123!@#"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "petapp"
    ports:
      - "5433:5432"
    volumes:
      - postgres_tests_data:/var/lib/postgresql/data

  # RabbitMQ for tests
  rabbitmq-tests:
    image: rabbitmq:3.12-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
    volumes:
      - rabbitmq_tests_data:/var/lib/rabbitmq

volumes:
  postgres_tests_data:
  rabbitmq_tests_data:
