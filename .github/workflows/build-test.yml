name: .NET Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: P@ssw0rd2024
          POSTGRES_USER: postgres
          POSTGRES_DB: petapp
        options: >-
          --health-cmd="pg_isready -U postgres -d petapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run tests
      run: |
        dotnet test \
          --no-build \
          --configuration Release \
          --verbosity normal \
          --logger "console;verbosity=normal" \
          --collect:"XPlat Code Coverage" \
          --settings "$(pwd)/tests/runsettings.xml" 2>&1 | tee test-results.log
      env:
        ASPNETCORE_ENVIRONMENT: Testing
        ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=petapp;Username=postgres;Password=P@ssw0rd2024;"
        POSTGRES_HOST: postgres
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: P@ssw0rd2024
        POSTGRES_DB: petapp
      timeout-minutes: 30
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage/coverage.opencover.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/TestResults/**/*.trx'
        check_name: Unit Test Results
