version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "PetApp123!@#"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "petapp"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pet-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pet-app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Identity Service
  identity-service:
    build:
      context: .
      dockerfile: src/services/identity-service/src/IdentityService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=crypticpassword
      - ConnectionStrings__IdentityServiceDb=Host=postgres;Database=PetApp.IdentityService;Username=postgres;Password=PetApp123!@#;
      - JwtSettings__SecretKey=your-super-secret-key-that-is-at-least-32-characters-long-for-256bit
      - JwtSettings__Issuer=pet-app-identity-service
      - JwtSettings__Audience=pet-app-api
    ports:
      - "5001:80"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-app-network

  # User Profile Service
  user-profile-service:
    build:
      context: .
      dockerfile: src/services/user-service/src/UserProfileService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=crypticpassword
      - ConnectionStrings__UserProfileServiceDb=Host=postgres;Database=PetApp.UserProfileService;Username=postgres;Password=PetApp123!@#;
      - JwtSettings__SecretKey=your-super-secret-key-that-is-at-least-32-characters-long-for-256bit
      - JwtSettings__Issuer=pet-app-identity-service
      - JwtSettings__Audience=pet-app-api
    ports:
      - "5002:80"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_started
    networks:
      - pet-app-network

  # Pet Service
  pet-service:
    build:
      context: .
      dockerfile: src/services/pet-service/src/PetService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=crypticpassword
      - ConnectionStrings__PetServiceDb=Host=postgres;Database=PetApp.PetService;Username=postgres;Password=PetApp123!@#;
      - JwtSettings__SecretKey=your-super-secret-key-that-is-at-least-32-characters-long-for-256bit
      - JwtSettings__Issuer=pet-app-identity-service
      - JwtSettings__Audience=pet-app-api
    ports:
      - "5005:80"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_started
    networks:
      - pet-app-network

  # File Service
  file-service:
    build:
      context: .
      dockerfile: src/services/file-service/src/FileService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=crypticpassword
      - ConnectionStrings__FileServiceDb=Host=postgres;Database=PetApp.FileService;Username=postgres;Password=PetApp123!@#;
      - JwtSettings__SecretKey=your-super-secret-key-that-is-at-least-32-characters-long-for-256bit
      - JwtSettings__Issuer=pet-app-identity-service
      - JwtSettings__Audience=pet-app-api
    ports:
      - "5003:80"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_started
    networks:
      - pet-app-network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: src/services/notification-service/src/NotificationService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=crypticpassword
    ports:
      - "5004:80"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-app-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: src/api-gateway/Gateway.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "44300:8080"
    depends_on:
      - identity-service
      - user-profile-service
      - pet-service
      - file-service
      - notification-service
    networks:
      - pet-app-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  pet-app-network:
    driver: bridge